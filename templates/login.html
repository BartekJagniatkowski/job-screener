{% extends "base.html" %}
{% block title %}Logowanie — Job Screener{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div style="margin-bottom:32px;">
    <div class="auth-brand">Job Screener</div>
    <div class="auth-sub">Etyczna analiza ofert pracy</div>
  </div>
  <div class="card">
    <form method="POST" style="padding:24px;">
      <div class="field">
        <label>Nazwa użytkownika</label>
        <input type="text" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label>Hasło</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Zaloguj się →</button>
    </form>
  </div>
</div>
{% endblock %}
