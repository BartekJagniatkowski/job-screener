{% extends "base.html" %}
{% block title %}Register — Job Screener{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div style="margin-bottom:32px;">
    <div class="auth-brand">Job Screener</div>
    <div class="auth-sub">Ethical job offer analysis</div>
  </div>
  <div class="card">
    <form method="POST" style="padding:24px;">
      {% if token %}<input type="hidden" name="token" value="{{ token }}">{% endif %}
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" autofocus required placeholder="e.g. bartek">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="new-password" required placeholder="at least 6 characters">
      </div>
      <div class="field">
        <label>Repeat password</label>
        <input type="password" name="password2" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create account →</button>
    </form>
  </div>
  <div class="auth-hint">After registration, complete your CV and Zero Rule in Settings.</div>
</div>
{% endblock %}
