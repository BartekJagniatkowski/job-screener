{% extends "base.html" %}
{% block title %}Utwórz konto — Job Screener{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div style="margin-bottom:32px;">
    <div class="auth-brand">Job Screener</div>
    <div class="auth-sub">Utwórz konto</div>
  </div>
  <div class="card">
    <form method="POST" style="padding:24px;">
      {% if token %}<input type="hidden" name="token" value="{{ token }}">{% endif %}
      <div class="field">
        <label>Nazwa użytkownika</label>
        <input type="text" name="username" autocomplete="username" autofocus required placeholder="np. bartek">
      </div>
      <div class="field">
        <label>Hasło</label>
        <input type="password" name="password" autocomplete="new-password" required placeholder="minimum 6 znaków">
      </div>
      <div class="field">
        <label>Powtórz hasło</label>
        <input type="password" name="password2" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Utwórz konto →</button>
    </form>
  </div>
  <div class="auth-hint">Po rejestracji uzupełnij swoje CV i Regułę Zero w Ustawieniach.</div>
</div>
{% endblock %}
