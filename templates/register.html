{% extends "base.html" %}
{% block title %}Register — Job Screener{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-header">
    <div class="auth-brand">job<span>screener</span></div>
    <div class="auth-sub">Argues back so you don't have to</div>
  </div>
  <div class="card">
    <form method="POST" class="auth-form">
      {% if token %}<input type="hidden" name="token" value="{{ token }}">{% endif %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" autofocus required placeholder="e.g. bartek">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" autocomplete="new-password" required placeholder="at least 10 characters">
      </div>
      <div class="field">
        <label>Repeat password</label>
        <input type="password" name="password2" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Create account →</button>
    </form>
  </div>
  <div class="auth-hint auth-hint--important">Complete your CV and Zero Rule in Settings after registration — the tool won't work well without them.</div>
</div>
{% endblock %}
